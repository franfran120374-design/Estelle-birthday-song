<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vingt-neuf Novembre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#17121c; --bg2:#221a29; --ink:#f3ece4; --muted:#9a8fa3;
    --ember:#e99b5c; --rose:#d98a7d;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #2a1f33 0%, var(--bg) 55%) fixed,
      var(--bg);
    color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;
    min-height:100svh;
    display:flex; align-items:center; justify-content:center;
    padding:32px 24px calc(32px + env(safe-area-inset-bottom));
    overflow:hidden;
  }
  .card{
    width:100%; max-width:380px; text-align:center;
    display:flex; flex-direction:column; align-items:center;
    opacity:0; transform:translateY(14px);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .1s forwards;
  }
  @keyframes rise{to{opacity:1; transform:none}}
  .eyebrow{
    font-size:.74rem; letter-spacing:.32em; text-transform:uppercase;
    color:var(--rose); margin-bottom:26px;
  }
  .date{
    font-family:"Instrument Serif",serif; font-style:italic;
    font-size:clamp(2.9rem,13vw,4rem); line-height:.95;
    letter-spacing:.01em;
  }
  .date .num{font-style:normal}
  .sub{
    font-family:"Instrument Serif",serif;
    font-size:1.05rem; color:var(--muted); margin-top:14px; letter-spacing:.02em;
  }

  /* L'ember : la commande de lecture, qui "respire" quand ça joue */
  .player{margin:46px 0 8px; position:relative}
  .halo{
    position:absolute; inset:-40px; border-radius:50%;
    background:radial-gradient(circle, rgba(233,155,92,.36), transparent 62%);
    opacity:0; transform:scale(.8); transition:opacity .6s;
    pointer-events:none;
  }
  .playing .halo{opacity:1; animation:breathe 3.4s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(.92); opacity:.55} 50%{transform:scale(1.12); opacity:.9}}
  .btn{
    width:96px; height:96px; border-radius:50%; border:1.5px solid rgba(233,155,92,.55);
    background:linear-gradient(160deg,#2d2233,#1d1626);
    color:var(--ember); cursor:pointer; position:relative; z-index:1;
    display:grid; place-items:center;
    box-shadow:0 18px 50px -20px rgba(233,155,92,.5), inset 0 1px 0 rgba(255,255,255,.06);
    transition:transform .25s, border-color .25s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:scale(.95)}
  .btn:focus-visible{outline:2px solid var(--ember); outline-offset:4px}
  .btn svg{width:34px; height:34px; fill:var(--ember); transition:opacity .2s}
  .icon-pause{display:none}
  .playing .icon-play{display:none}
  .playing .icon-pause{display:block}

  .scrub{width:100%; max-width:300px; margin-top:34px}
  .bar{height:3px; border-radius:3px; background:rgba(255,255,255,.12); position:relative; cursor:pointer}
  .fill{height:100%; border-radius:3px; width:0%;
    background:linear-gradient(90deg,var(--rose),var(--ember))}
  .knob{position:absolute; top:50%; left:0%; width:11px; height:11px; border-radius:50%;
    background:var(--ember); transform:translate(-50%,-50%); box-shadow:0 0 0 4px rgba(233,155,92,.15)}
  .times{display:flex; justify-content:space-between; font-size:.72rem; color:var(--muted);
    margin-top:10px; font-variant-numeric:tabular-nums}

  .dedicace{margin-top:44px; font-family:"Instrument Serif",serif; font-style:italic;
    font-size:.98rem; color:var(--muted); max-width:280px; line-height:1.5}
  .hint{margin-top:18px; font-size:.72rem; color:#6f6577; letter-spacing:.04em; height:1em;
    transition:opacity .4s}

  @media (prefers-reduced-motion:reduce){
    .card{animation:none; opacity:1; transform:none}
    .playing .halo{animation:none}
  }
</style>
</head>
<body>
  <main class="card" id="card">
    <p class="eyebrow">pour toi</p>
    <h1 class="date"><span class="num">29</span> novembre</h1>
    <p class="sub">un cover, rien que pour cette date</p>

    <div class="player">
      <div class="halo"></div>
      <button class="btn" id="btn" aria-label="Lire la chanson">
        <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
    </div>

    <div class="scrub">
      <div class="bar" id="bar"><div class="fill" id="fill"></div><div class="knob" id="knob"></div></div>
      <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    </div>

    <p class="dedicace">« &nbsp;Cette chanson me faisait penser à toi, alors je l'ai chantée.&nbsp; »</p>
    <p class="hint" id="hint">touche pour écouter</p>

    <audio id="audio" preload="metadata" src="./vingt-neuf-novembre.mp3"></audio>
  </main>

<script>
  const audio=document.getElementById('audio'), btn=document.getElementById('btn'),
        card=document.getElementById('card'), fill=document.getElementById('fill'),
        knob=document.getElementById('knob'), bar=document.getElementById('bar'),
        cur=document.getElementById('cur'), dur=document.getElementById('dur'),
        hint=document.getElementById('hint');
  const fmt=t=>{ if(!isFinite(t))return"0:00"; const m=Math.floor(t/60),s=Math.floor(t%60); return m+":"+String(s).padStart(2,'0'); };

  function toggle(){ audio.paused ? audio.play().catch(()=>{}) : audio.pause(); }
  btn.addEventListener('click',toggle);

  audio.addEventListener('play',()=>{ card.classList.add('playing'); hint.style.opacity='0'; });
  audio.addEventListener('pause',()=>{ card.classList.remove('playing'); });
  audio.addEventListener('loadedmetadata',()=>{ dur.textContent=fmt(audio.duration); });
  audio.addEventListener('timeupdate',()=>{
    const p=audio.currentTime/(audio.duration||1)*100;
    fill.style.width=p+'%'; knob.style.left=p+'%'; cur.textContent=fmt(audio.currentTime);
  });
  audio.addEventListener('ended',()=>{ card.classList.remove('playing'); hint.style.opacity='1'; hint.textContent='rejouer ?'; });

  bar.addEventListener('click',e=>{
    const r=bar.getBoundingClientRect();
    audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||0);
  });

  // tentative de lecture auto au scan ; si le navigateur la bloque, le bouton prend le relais
  window.addEventListener('load',()=>{ audio.play().catch(()=>{ hint.textContent='touche pour écouter'; }); });
</script>
</body>
</html>
